<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KGL Dashboard</title>
       <!-- Local Bootstrap CSS -->
        <link rel="stylesheet" href="/public/css/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/public/css/bootstrap-icons/bootstrap-icons.css">
 

    <!-- Custom CSS -->
       <link rel="stylesheet" href="/public/css/style.css">

    <style>
        body {
            overflow-x: hidden;
        }

        .sidebar {
            width: 230px;
            height: 100vh;
            position: fixed;
            background-color: #198754;
            padding-top: 20px;
        }

        .sidebar a {
            display: block;
            padding: 10px 20px;
            color: #fff;
            text-decoration: none;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background-color: rgba(255,255,255,0.2);
        }

        .main-content {
            margin-left: 230px;
            padding: 30px;
        }
    </style>
</head>
<body class="bg-light">

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="text-center mb-4">
        <img src="/public/image/karibu logo.jpg" width="60" class="rounded-circle shadow">
        <h6 class="text-white mt-2">KGL System</h6>
    </div>

    <a href="manager.html" class="active"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
    <a href="procurement.html"><i class="bi bi-cart-plus me-2"></i>Procurement</a>
    <a href="sales.html"><i class="bi bi-bag-check me-2"></i>Sales</a>
    <a href="credit-sales.html"><i class="bi bi-wallet2 me-2"></i>Credit Sales</a>
    <a href="reports.html"><i class="bi bi-graph-up me-2"></i>Reports</a>

    <a href="#" id="logoutBtn" class="mt-auto text-danger">
        <i class="bi bi-box-arrow-right me-2"></i>Logout
    </a>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold text-success">Dashboard</h3>
            <p class="text-muted mb-0">Karibu Groceries Management System</p>
        </div>

        <span id="loggedInUser" class="badge bg-success fs-6 px-3 py-2"></span>
    </div>

    <!-- SUMMARY CARDS -->
    <div class="row g-4 mb-5">
        <div class="col-md-4">
            <div class="card shadow text-center">
                <div class="card-body">
                    <i class="bi bi-box-seam fs-1 text-success"></i>
                    <h6 class="text-muted mt-2">Total Stock</h6>
                    <h4 class="fw-bold text-success" id="totalStock">0 KG</h4>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow text-center">
                <div class="card-body">
                    <i class="bi bi-currency-dollar fs-1 text-success"></i>
                    <h6 class="text-muted mt-2">Today’s Sales</h6>
                    <h4 class="fw-bold text-success" id="todaysSales">UGX 0</h4>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow text-center">
                <div class="card-body">
                    <i class="bi bi-wallet2 fs-1 text-danger"></i>
                    <h6 class="text-muted mt-2">Credit Outstanding</h6>
                    <h4 class="fw-bold text-danger" id="creditOutstanding">UGX 0</h4>
                </div>
            </div>
        </div>
    </div>

    <!-- QUICK ACTIONS -->
    <div class="card shadow">
        <div class="card-header bg-success text-white fw-bold">
            Quick Actions
        </div>
        <div class="card-body text-center">
            <a href="procurement.html" class="btn btn-success btn-lg m-2">
                <i class="bi bi-cart-plus me-1"></i> Record Procurement
            </a>
            <a href="sales.html" class="btn btn-success btn-lg m-2">
                <i class="bi bi-bag-check me-1"></i> Record Sale
            </a>
            <a href="credit-sales.html" class="btn btn-warning btn-lg m-2 text-white">
                <i class="bi bi-wallet2 me-1"></i> Credit Sale
            </a>
        </div>
    </div>

    <!-- LOW STOCK ALERTS -->
    <div class="mt-5">
        <h4 class="text-danger">Low Stock Alerts</h4>
        <ul id="lowStockList" class="list-group"></ul>
    </div>

    <footer class="text-center text-muted mt-5">
        &copy; 2026 Karibu Groceries LTD
    </footer>
</div>

<!-- SCRIPTS -->
<script>
    // ===== SESSION MANAGEMENT =====
    const session = JSON.parse(localStorage.getItem("currentSession"));
    const token = localStorage.getItem("token");

    if (!session || !token) {
        window.location.href = "index.html";
    } else {
        document.getElementById("loggedInUser").textContent =
            `Welcome: ${session.username} (${session.role})`;
    }

    document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("currentSession");
        localStorage.removeItem("token");
        window.location.href = "index.html";
    });

    // ===== LOW STOCK =====
    async function loadLowStock() {
        try {
            const response = await fetch("http://localhost:5000/api/produce/low-stock", {
                headers: { "Authorization": "Bearer " + token }
            });
            const data = await response.json();
            const list = document.getElementById("lowStockList");
            list.innerHTML = "";

            if (data.length === 0) {
                list.innerHTML = "<li class='list-group-item text-success'>All stock levels are good</li>";
            } else {
                data.sort((a,b) => a.tonnage - b.tonnage);
                data.forEach(item => {
                    const status = item.tonnage === 0 
                        ? "<span class='badge bg-danger'>OUT OF STOCK</span>"
                        : "<span class='badge bg-warning text-dark'>LOW STOCK</span>";

                    list.innerHTML += `
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                          ${item.name} (${item.tonnage} kg)
                          ${status}
                        </li>
                    `;
                });
            }
        } catch (err) {
            console.error("Error loading low stock:", err);
        }
    }

    // ===== DASHBOARD SUMMARY =====
    async function loadDashboard() {
        try {
            // 1. Total Stock
            const stockRes = await fetch("http://localhost:5000/api/produce/low-stock", {
                headers: { "Authorization": "Bearer " + token }
            });
            const stockData = await stockRes.json();
            const totalStock = stockData.reduce((sum, item) => sum + item.tonnage, 0);
            document.getElementById("totalStock").textContent = totalStock + " KG";

            // 2. Today's Sales
            const today = new Date().toISOString().split('T')[0];
            const salesRes = await fetch(`http://localhost:5000/api/sales/today?date=${today}`, {
                headers: { "Authorization": "Bearer " + token }
            });
            const salesData = await salesRes.json();
            const totalSales = salesData.reduce((sum, sale) => sum + sale.amountPaid, 0);
            document.getElementById("todaysSales").textContent = "UGX " + totalSales.toLocaleString();

            // 3. Credit Outstanding
            const creditRes = await fetch("http://localhost:5000/api/credit-sales/", {
                headers: { "Authorization": "Bearer " + token }
            });
            const creditData = await creditRes.json();
            const totalCredit = creditData.creditSales.reduce((sum, sale) => sum + sale.amountDue, 0);
            document.getElementById("creditOutstanding").textContent = "UGX " + totalCredit.toLocaleString();

        } catch (err) {
            console.error("Error loading dashboard:", err);
        }
    }

    // Load everything
    loadLowStock();
    loadDashboard();
</script>

<script src="/public/css/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
